name: Daily National Risk Digest

on:
  schedule:
    - cron: '23 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run collection
        run: python scripts/collect_digest.py
        env:
          USER_AGENT: "DailyReview (https://github.com/nationalriskreview/DailyReview)"
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT: dailyreview-496300
          WMATA_API_KEY: ${{ secrets.WMATA_API_KEY }}
          NJT_API_KEY: ${{ secrets.NJT_API_KEY }}
          METRA_API_KEY: ${{ secrets.METRA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Daily digest $(date -u +%Y-%m-%d)"
          git push
